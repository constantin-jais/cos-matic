name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features

  # Dogfood: the tool gates its own example (ADR-0010). Fails if the committed
  # example outputs drift from the source, or a hard gate breaks.
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build aom
        run: cargo build --bin aom
      - name: Goals
        run: ./target/debug/aom goals --manifest examples/minimal/harness.toml
      - name: Drift gate
        run: ./target/debug/aom generate --check --manifest examples/minimal/harness.toml
