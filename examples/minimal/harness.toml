[package]
name = "minimal-example"

[[domains]]
name = "code-style"
priority = 5
content_file = "domains/code-style.md"

[[domains]]
name = "security"
priority = 10
content_file = "domains/security.md"

[[profiles]]
name = "default"
domains = ["code-style", "security"]

[[targets]]
name = "agents-md"
adapter = "universal"
output_file = "AGENTS.md"
profile = "default"

[[targets]]
name = "claude-code"
adapter = "claude"
output_file = "CLAUDE.md"
profile = "default"

[[targets]]
name = "cursor"
adapter = "cursor"
output_dir = ".cursor/rules"
profile = "default"
