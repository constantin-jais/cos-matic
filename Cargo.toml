[package]
name = "agent-o-matic"
version = "0.0.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
description = "A clean-room, deterministic, agent-agnostic configuration compiler: one declarative source, many AI-agent configs, with safe-write and drift detection."
repository = "https://github.com/Cos-su/Agent-O-Matic"
readme = "README.md"
keywords = ["ai", "agents", "codegen", "claude", "agents-md"]
categories = ["command-line-utilities", "development-tools"]

[lib]
name = "agent_o_matic"
path = "src/lib.rs"

[[bin]]
name = "aom"
path = "src/main.rs"

[dependencies]
blake3 = "1"
clap = { version = "4", features = ["derive"] }
miette = { version = "7", features = ["fancy"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"

[dev-dependencies]
tempfile = "3"

[profile.release]
strip = true
lto = "thin"
