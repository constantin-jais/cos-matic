[package]
name = "minimal-example"
# Pull a curated domain straight from the embedded library (ADR-0008).
builtins = ["tdd"]

[[domains]]
name = "code-style"
priority = 5
content_file = "domains/code-style.md"

[[domains]]
name = "security"
priority = 10
content_file = "domains/security.md"

[[profiles]]
name = "default"
domains = ["code-style", "security", "tdd"]

[[targets]]
name = "agents-md"
adapter = "universal"
output_file = "AGENTS.md"
profile = "default"

[[targets]]
name = "claude-code"
adapter = "claude"
output_file = "CLAUDE.md"
profile = "default"

[[targets]]
name = "cursor"
adapter = "cursor"
output_dir = ".cursor/rules"
profile = "default"

# Goals are safe, declarative checks the tool runs itself (ADR-0009).
[[goals]]
kind = "hard_gate"           # blocks generation if it fails
check = "no-dead-domains"

[[goals]]
kind = "observability"       # reported, never blocks
check = "max-content-lines"
