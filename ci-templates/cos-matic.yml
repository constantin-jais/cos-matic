# Reusable CI gate for projects that use cos-matic (ADR-0010).
#
# Copy this to `.github/workflows/cos-matic.yml` in your repository. It fails
# the build if your committed agent configs have drifted from `harness.toml`, or
# if a hard-gate goal is not met.
name: cos-matic

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2 # cache the install build across runs

      - name: Install cos-matic
        # Pin to a released tag once available (append `--tag vX.Y.Z`); until then
        # this tracks the default branch. Once on crates.io: cargo install cos-matic
        run: cargo install --locked --git https://github.com/constantin-jais/cos-matic

      # `generate --check` also enforces hard gates, but a dedicated `goals` step
      # gives a clean, separate report (and surfaces observability metrics).
      - name: Goals
        run: cosmatic goals

      - name: Drift gate (committed outputs must match the source)
        run: cosmatic generate --check
