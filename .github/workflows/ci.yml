name: ci

on:
  # PRs are gated by `pull_request`; `push` only verifies the default branch
  # post-merge. A fix branch otherwise ran CI twice (push + PR) for the same SHA.
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features

  # Dogfood: the tool gates its own example (ADR-0010). Fails if the committed
  # example outputs drift from the source, or a hard gate breaks.
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build aom
        run: cargo build --bin aom
      - name: Goals
        run: ./target/debug/aom goals --manifest examples/minimal/harness.toml
      - name: Drift gate
        run: ./target/debug/aom generate --check --manifest examples/minimal/harness.toml

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@cargo-deny
      - name: Dependency audit
        run: ./scripts/audit-deps.sh

  # Coverage: a report on every run + a blocking floor (CLAUDE.md quality gate:
  # "rapport genere, seuil bloquant en CI"). Measured line coverage is ~85.5%; the
  # live-boundary I/O wrappers (gh/git/claude subprocess) are deliberately not
  # unit-covered, which caps the achievable figure. The floor sits just below with
  # a small margin — ratchet it up as coverage grows.
  coverage:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "" # cargo-llvm-cov manages its own instrumentation flags
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Coverage report + blocking floor
        run: cargo llvm-cov --workspace --all-features --summary-only --fail-under-lines 80
