name: orchestrator-loop

# Engine repository smoke only. The autonomous live loop belongs in the public
# sandbox harness (`bolt-harness`), not in the canonical engine repository.
# This workflow is intentionally manual and read-only.
on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to drive the dry-run loop"
        required: true
        type: string
      title:
        description: "Short title handed to the loop"
        required: true
        default: "ci: autonomous loop"
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: read
  statuses: read

concurrency:
  group: orchestrator-loop-dry-run
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build bolt-cosmatic
        run: cargo build --bin bolt-cosmatic
      - name: Loop dry-run
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          ./target/debug/bolt-cosmatic loop --dry-run
          --issue "${{ inputs.issue }}"
          --title "${{ inputs.title }}"
