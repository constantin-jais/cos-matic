# Dependency policy for bolt-cos-matic.
#
# Goals:
# - fail on new security advisories/yanked crates by default;
# - keep every temporary exception explicit and reviewable;
# - allow only OSI/permissive licenses compatible with an MIT Rust CLI.
#
# Run locally with:
#   cargo deny check advisories licenses sources

[graph]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Transitive via octocrab -> jsonwebtoken -> rsa. bolt-cosmatic does not perform RSA private-key operations; GitHub auth is token-based. No fixed upstream version is available yet. Re-evaluate on every octocrab/jsonwebtoken upgrade before v0.1 stable." },
    { id = "RUSTSEC-2025-0057", reason = "Transitive via inquire -> crossterm/fxhash. Used only for local interactive init prompts, not a network/runtime trust boundary. Track inquire replacement or upstream update before v0.1 stable." },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0", # Boost Software License, not Business Source License (BUSL-1.1).
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
